workflows:
  ios-workflow:
    name: iOS Release Build (Expo)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: sayup-ai-codemagic
    environment:
      vars:
        BUNDLE_ID: "com.speakfitai.app"
        APP_STORE_APP_ID: "6775925306"
        NODE_VERSION: "22"
      node: "22"
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - sayup-ai-appstore-profile
        certificates:
          - sayup-ai-distribution
    scripts:
      - name: Set up keychain
        script: |
          keychain initialize

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Install pnpm
        script: |
          if ! command -v pnpm &> /dev/null; then
            npm install -g pnpm@9.12.0
          else
            echo "pnpm already installed: $(pnpm --version)"
          fi

      - name: Install dependencies
        script: |
          pnpm config set store-dir /tmp/pnpm-store
          pnpm install --no-frozen-lockfile

      - name: Expo Prebuild (generate native iOS project)
        script: |
          npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Archive and Export iOS app
        script: |
          # Find xcworkspace
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          if [ -z "$WORKSPACE" ]; then
            WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 3 | grep -v ".xcodeproj/" | head -1)
          fi
          if [ -z "$WORKSPACE" ]; then
            echo "ERROR: No xcworkspace found in ios/"
            ls -la ios/ || true
            exit 1
          fi
          echo "Found workspace: $WORKSPACE"

          # Get scheme name
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null | awk '/Schemes:/,0' | grep -v 'Schemes:' | grep -v 'Pods' | sed 's/^[[:space:]]*//' | grep -v '^$' | head -1)
          if [ -z "$SCHEME" ]; then
            SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          fi
          echo "Using scheme: $SCHEME"

          # Create export options plist using Python (Xcode 26 compatible: app-store-connect)
          python3 << 'PYEOF'
import plistlib
d = {
  'method': 'app-store-connect',
  'teamID': '6Q7S9N7MQ7',
  'signingStyle': 'manual',
  'signingCertificate': 'Apple Distribution',
  'provisioningProfiles': {
    'com.speakfitai.app': 'SpeakFit AI ios_app_store 1783551989'
  },
  'uploadBitcode': False,
  'uploadSymbols': True
}
with open('/tmp/export_options.plist', 'wb') as f:
  plistlib.dump(d, f)
print('Export options plist created at /tmp/export_options.plist')
PYEOF

          ARCHIVE_PATH="/tmp/SayUpAI.xcarchive"
          IPA_DIR="build/ios/ipa"
          mkdir -p "$IPA_DIR"

          # Archive
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            PROVISIONING_PROFILE_SPECIFIER="SpeakFit AI ios_app_store 1783551989" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE="Manual" \
            DEVELOPMENT_TEAM="6Q7S9N7MQ7" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcpretty --color

          # Export IPA
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$IPA_DIR" \
            -exportOptionsPlist /tmp/export_options.plist \
            COMPILER_INDEX_STORE_ENABLE=NO

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/*.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-workflow:
    name: Android Release Build (Expo)
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      vars:
        PACKAGE_NAME: "com.speakfitai.app"
        NODE_VERSION: "22"
      node: "22"
    scripts:
      - name: Install pnpm
        script: |
          if ! command -v pnpm &> /dev/null; then
            npm install -g pnpm@9.12.0
          else
            echo "pnpm already installed: $(pnpm --version)"
          fi

      - name: Install dependencies
        script: |
          pnpm install

      - name: Expo Prebuild (generate native Android project)
        script: |
          npx expo prebuild --platform android --clean --no-install

      - name: Build Android APK/AAB
        script: |
          cd android && ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
