workflows:
  ios-workflow:
    name: iOS Release Build (Expo)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: sayup-ai-codemagic
    environment:
      vars:
        BUNDLE_ID: "com.speakfitai.app"
        APP_STORE_APP_ID: "6775925306"
        NODE_VERSION: "22"
      node: "22"
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - sayup-ai-appstore-profile
        certificates:
          - sayup-ai-distribution
    scripts:
      - name: Set up keychain
        script: |
          keychain initialize

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Install pnpm
        script: |
          # pnpm이 이미 설치되어 있는 경우 버전 확인 후 필요시 재설치
          if ! command -v pnpm &> /dev/null; then
            npm install -g pnpm@9.12.0
          else
            echo "pnpm already installed: $(pnpm --version)"
          fi

      - name: Install dependencies
        script: |
          # reflink 지원되지 않는 파일시스템에서의 오류 회피
          pnpm config set store-dir /tmp/pnpm-store
          pnpm install --no-frozen-lockfile

      - name: Expo Prebuild (generate native iOS project)
        script: |
          npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Archive iOS app
        script: |
          # xcworkspace 파일 동적 탐색 (xcworkspace 우선, xcodeproj 내부 제외)
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          if [ -z "$WORKSPACE" ]; then
            # xcodeproj 내부의 xcworkspace 탐색
            WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 3 | grep -v ".xcodeproj/" | head -1)
          fi
          if [ -z "$WORKSPACE" ]; then
            WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 3 | head -1)
          fi
          if [ -z "$WORKSPACE" ]; then
            echo "ERROR: No xcworkspace found in ios/"
            ls -la ios/ || true
            exit 1
          fi
          echo "Found workspace: $WORKSPACE"
          ls -la ios/ || true
          # scheme 선택: xcodebuild -list로 앱 scheme 확정 (Pods 제외)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null | awk '/Schemes:/,0' | grep -v 'Schemes:' | grep -v 'Pods' | sed 's/^[[:space:]]*//' | head -1)
          if [ -z "$SCHEME" ]; then
            # fallback: xcworkspace 이름 사용
            SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          fi
          echo "Using workspace: $WORKSPACE, scheme: $SCHEME"
          # SPM 의존성 resolve (Expo 모듈 포함)
          xcodebuild -resolvePackageDependencies -workspace "$WORKSPACE" -scheme "$SCHEME" 2>&1 | tail -5 || true
          mkdir -p build/ios
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --archive-xcargs "PROVISIONING_PROFILE_SPECIFIER='SpeakFit AI ios_app_store 1783551989' CODE_SIGN_IDENTITY='Apple Distribution'"

      - name: Export IPA
        script: |
          echo "IPA already exported by xcode-project build-ipa"

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/Archives/**/*.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-workflow:
    name: Android Release Build (Expo)
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      vars:
        PACKAGE_NAME: "com.speakfitai.app"
        NODE_VERSION: "22"
      node: "22"
    scripts:
      - name: Install pnpm
        script: |
          # pnpm이 이미 설치되어 있는 경우 버전 확인 후 필요시 재설치
          if ! command -v pnpm &> /dev/null; then
            npm install -g pnpm@9.12.0
          else
            echo "pnpm already installed: $(pnpm --version)"
          fi

      - name: Install dependencies
        script: |
          pnpm install

      - name: Expo Prebuild (generate native Android project)
        script: |
          npx expo prebuild --platform android --clean --no-install

      - name: Build Android APK/AAB
        script: |
          cd android && ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
