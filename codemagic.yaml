workflows:
  ios-workflow:
    name: iOS Release Build (Expo)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: sayup-ai-codemagic
    environment:
      vars:
        BUNDLE_ID: "com.speakfitai.app"
        APP_STORE_APP_ID: "6775925306"
        NODE_VERSION: "22"
        TEAM_ID: "6Q7S9N7MQ7"
        PROVISIONING_PROFILE_NAME: "SpeakFit AI ios_app_store 1783551989"
      node: "22"
      xcode: 16.4
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - sayup-ai-appstore-profile
        certificates:
          - sayup-ai-distribution
    scripts:
      - name: Set up keychain
        script: |
          keychain initialize

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Install pnpm
        script: |
          if ! command -v pnpm &> /dev/null; then
            npm install -g pnpm@9.12.0
          else
            echo "pnpm already installed: $(pnpm --version)"
          fi

      - name: Install dependencies
        script: |
          pnpm config set store-dir /tmp/pnpm-store
          pnpm install --no-frozen-lockfile

      - name: Expo Prebuild (generate native iOS project)
        script: |
          npx expo prebuild --platform ios --clean --no-install

      - name: Fix Xcode project code signing (force manual App Store signing)
        script: |
          PBXPROJ="ios/SayUpAI.xcodeproj/project.pbxproj"
          if [ ! -f "$PBXPROJ" ]; then
            echo "ERROR: $PBXPROJ not found"
            ls ios/ || true
            exit 1
          fi
          echo "=== Before fix: CODE_SIGN_STYLE occurrences ==="
          grep -n "CODE_SIGN_STYLE\|DEVELOPMENT_TEAM\|PROVISIONING_PROFILE\|CODE_SIGN_IDENTITY" "$PBXPROJ" | head -30 || true

          # Force manual signing: replace Automatic with Manual
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          # Set development team
          sed -i '' "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = $TEAM_ID;/g" "$PBXPROJ"
          sed -i '' "s/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = $TEAM_ID;/g" "$PBXPROJ"
          # Set code sign identity to Apple Distribution for Release
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer";/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "Apple Distribution";/g' "$PBXPROJ"
          # Set provisioning profile specifier
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\";/PROVISIONING_PROFILE_SPECIFIER = \"$PROVISIONING_PROFILE_NAME\";/g" "$PBXPROJ"

          echo "=== After fix: CODE_SIGN_STYLE occurrences ==="
          grep -n "CODE_SIGN_STYLE\|DEVELOPMENT_TEAM\|PROVISIONING_PROFILE\|CODE_SIGN_IDENTITY" "$PBXPROJ" | head -30 || true

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
          echo "=== exportOptions generated by use-profiles ==="
          cat "$HOME/export_options.plist" || echo "File not found"

      - name: Archive and Export iOS app
        script: |
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          if [ -z "$WORKSPACE" ]; then
            WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 3 | grep -v ".xcodeproj/" | head -1)
          fi
          if [ -z "$WORKSPACE" ]; then
            echo "ERROR: No xcworkspace found in ios/"
            ls -la ios/ || true
            exit 1
          fi
          echo "Found workspace: $WORKSPACE"

          # List all available schemes for debugging
          echo "=== Available schemes ==="
          xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null || true

          # Use SayUpAI scheme (main app scheme from Expo Prebuild)
          SCHEME="SayUpAI"
          # Verify scheme exists, fallback to workspace name if not
          if ! xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null | grep -q "$SCHEME"; then
            echo "WARNING: $SCHEME scheme not found, trying EXApplication"
            SCHEME="EXApplication"
          fi
          echo "Using scheme: $SCHEME"

          ARCHIVE_PATH="/tmp/SayUpAI.xcarchive"
          IPA_DIR="build/ios/ipa"
          mkdir -p "$IPA_DIR"

          echo "=== Xcode version ==="
          xcodebuild -version

          # Use exportOptions generated by xcode-project use-profiles
          EXPORT_OPTIONS="$HOME/export_options.plist"
          echo "=== exportOptions from use-profiles ==="
          cat "$EXPORT_OPTIONS" || echo "File not found!"

          set -o pipefail
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=NO \
            2>&1 | tee /tmp/xcodebuild_archive.log | tail -50

          ARCHIVE_EXIT=${PIPESTATUS[0]}
          echo "=== Archive exit code: $ARCHIVE_EXIT ==="
          if [ $ARCHIVE_EXIT -ne 0 ]; then
            echo "=== Archive FAILED. Last 100 lines of log ==="
            tail -100 /tmp/xcodebuild_archive.log
            exit $ARCHIVE_EXIT
          fi

          echo "=== Archive result ==="
          ls -la "$ARCHIVE_PATH" || echo "Archive not found!"
          ls -la "$ARCHIVE_PATH/Products/" || echo "Products dir not found!"

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$IPA_DIR" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            COMPILER_INDEX_STORE_ENABLE=NO

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/*.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-workflow:
    name: Android Release Build (Expo)
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      vars:
        PACKAGE_NAME: "com.speakfitai.app"
        NODE_VERSION: "22"
      node: "22"
    scripts:
      - name: Install pnpm
        script: |
          if ! command -v pnpm &> /dev/null; then
            npm install -g pnpm@9.12.0
          else
            echo "pnpm already installed: $(pnpm --version)"
          fi

      - name: Install dependencies
        script: |
          pnpm install

      - name: Expo Prebuild (generate native Android project)
        script: |
          npx expo prebuild --platform android --clean --no-install

      - name: Build Android APK/AAB
        script: |
          cd android && ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
