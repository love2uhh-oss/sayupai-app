workflows:
  ios-workflow:
    name: iOS Release Build (Expo)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: sayup-ai-codemagic
    environment:
      vars:
        BUNDLE_ID: "com.speakfitai.app"
        APP_STORE_APP_ID: "6775925306"
        NODE_VERSION: "22"
        TEAM_ID: "6Q7S9N7MQ7"
        PROVISIONING_PROFILE_NAME: "SpeakFit AI ios_app_store 1783551989"
      node: "22"
      xcode: 16.4
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - sayup-ai-appstore-profile
        certificates:
          - sayup-ai-distribution
    scripts:
      - name: Set up keychain
        script: |
          keychain initialize

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Install pnpm
        script: |
          if ! command -v pnpm &> /dev/null; then
            npm install -g pnpm@9.12.0
          else
            echo "pnpm already installed: $(pnpm --version)"
          fi

      - name: Install dependencies
        script: |
          pnpm config set store-dir /tmp/pnpm-store
          pnpm install --no-frozen-lockfile

      - name: Expo Prebuild (generate native iOS project)
        script: |
          npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
          echo "=== exportOptions generated by use-profiles ==="
          cat "$HOME/export_options.plist" || echo "File not found"

      - name: Fix Xcode project and exportOptions for Xcode 16.4
        script: |
          PBXPROJ="ios/SayUpAI.xcodeproj/project.pbxproj"
          if [ ! -f "$PBXPROJ" ]; then
            echo "ERROR: $PBXPROJ not found"
            ls ios/ || true
            exit 1
          fi

          # Fix pbxproj: must run AFTER xcode-project use-profiles
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          sed -i '' "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = $TEAM_ID;/g" "$PBXPROJ"
          sed -i '' "s/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = $TEAM_ID;/g" "$PBXPROJ"
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer";/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "Apple Distribution";/g' "$PBXPROJ"
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\";/PROVISIONING_PROFILE_SPECIFIER = \"$PROVISIONING_PROFILE_NAME\";/g" "$PBXPROJ"
          sed -i '' 's/SKIP_INSTALL = YES;/SKIP_INSTALL = NO;/g' "$PBXPROJ"

          echo "=== SKIP_INSTALL check ==="
          if grep -q "SKIP_INSTALL = YES" "$PBXPROJ"; then
            echo "ERROR: SKIP_INSTALL is still YES!"
            grep -n "SKIP_INSTALL" "$PBXPROJ"
            exit 1
          fi
          echo "SKIP_INSTALL = NO confirmed"

          # Get the provisioning profile UUID from installed profiles
          PROFILE_UUID=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" 2>/dev/null | while read f; do
            NAME=$(security cms -D -i "$f" 2>/dev/null | plutil -extract Name raw - 2>/dev/null)
            if [ "$NAME" = "$PROVISIONING_PROFILE_NAME" ]; then
              security cms -D -i "$f" 2>/dev/null | plutil -extract UUID raw -
              break
            fi
          done)

          if [ -z "$PROFILE_UUID" ]; then
            echo "WARNING: Could not find profile UUID, listing available profiles..."
            find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" 2>/dev/null | while read f; do
              NAME=$(security cms -D -i "$f" 2>/dev/null | plutil -extract Name raw - 2>/dev/null)
              UUID=$(security cms -D -i "$f" 2>/dev/null | plutil -extract UUID raw - 2>/dev/null)
              echo "  Name: $NAME | UUID: $UUID"
            done
          else
            echo "Found profile UUID: $PROFILE_UUID"
          fi

          # Create Xcode 16.4 compatible exportOptions.plist
          # Xcode 16+ uses 'method: app-store-connect' instead of deprecated 'method: app-store'
          EXPORT_OPTIONS="$HOME/export_options.plist"
          cat > "$EXPORT_OPTIONS" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROVISIONING_PROFILE_NAME}</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          echo "=== New exportOptions.plist ==="
          cat "$EXPORT_OPTIONS"

      - name: Archive and Export iOS app
        script: |
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          if [ -z "$WORKSPACE" ]; then
            WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 3 | grep -v ".xcodeproj/" | head -1)
          fi
          if [ -z "$WORKSPACE" ]; then
            echo "ERROR: No xcworkspace found in ios/"
            ls -la ios/ || true
            exit 1
          fi
          echo "Found workspace: $WORKSPACE"

          SCHEME="SayUpAI"
          if ! xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null | grep -q "^        $SCHEME$"; then
            echo "WARNING: $SCHEME scheme not found, trying EXApplication"
            SCHEME="EXApplication"
          fi
          echo "Using scheme: $SCHEME"

          ARCHIVE_PATH="/tmp/SayUpAI.xcarchive"
          IPA_DIR="build/ios/ipa"
          mkdir -p "$IPA_DIR"

          echo "=== Xcode version ==="
          xcodebuild -version

          EXPORT_OPTIONS="$HOME/export_options.plist"
          echo "=== exportOptions ==="
          cat "$EXPORT_OPTIONS"

          set -o pipefail
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_NAME" \
            2>&1 | tee /tmp/xcodebuild_archive.log | tail -50

          ARCHIVE_EXIT=${PIPESTATUS[0]}
          if [ $ARCHIVE_EXIT -ne 0 ]; then
            echo "=== Archive FAILED. Last 100 lines ==="
            tail -100 /tmp/xcodebuild_archive.log
            exit $ARCHIVE_EXIT
          fi

          echo "=== Archive result ==="
          find "$ARCHIVE_PATH" -maxdepth 4 2>/dev/null
          APP_COUNT=$(find "$ARCHIVE_PATH/Products/Applications/" -name "*.app" -maxdepth 1 2>/dev/null | wc -l)
          echo "Found $APP_COUNT .app file(s) in archive"
          if [ "$APP_COUNT" -eq 0 ]; then
            echo "ERROR: No .app in archive. SKIP_INSTALL may still be YES."
            exit 1
          fi

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$IPA_DIR" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            COMPILER_INDEX_STORE_ENABLE=NO

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/*.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-workflow:
    name: Android Release Build (Expo)
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      vars:
        PACKAGE_NAME: "com.speakfitai.app"
        NODE_VERSION: "22"
      node: "22"
    scripts:
      - name: Install pnpm
        script: |
          if ! command -v pnpm &> /dev/null; then
            npm install -g pnpm@9.12.0
          else
            echo "pnpm already installed: $(pnpm --version)"
          fi

      - name: Install dependencies
        script: |
          pnpm install

      - name: Expo Prebuild (generate native Android project)
        script: |
          npx expo prebuild --platform android --clean --no-install

      - name: Build Android APK/AAB
        script: |
          cd android && ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
