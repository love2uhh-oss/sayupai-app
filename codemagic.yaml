workflows:
  ios-workflow:
    name: iOS Release Build (Expo)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: sayup-ai-codemagic
    environment:
      vars:
        BUNDLE_ID: "com.speakfitai.app"
        APP_STORE_APP_ID: "6775925306"
        NODE_VERSION: "22"
      node: "22"
      xcode: 16.4
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - sayup-ai-appstore-profile
        certificates:
          - sayup-ai-distribution
    scripts:
      - name: Set up keychain
        script: |
          keychain initialize

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Install pnpm
        script: |
          if ! command -v pnpm &> /dev/null; then
            npm install -g pnpm@9.12.0
          else
            echo "pnpm already installed: $(pnpm --version)"
          fi

      - name: Install dependencies
        script: |
          pnpm config set store-dir /tmp/pnpm-store
          pnpm install --no-frozen-lockfile

      - name: Expo Prebuild (generate native iOS project)
        script: |
          npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Archive and Export iOS app
        script: |
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          if [ -z "$WORKSPACE" ]; then
            WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 3 | grep -v ".xcodeproj/" | head -1)
          fi
          if [ -z "$WORKSPACE" ]; then
            echo "ERROR: No xcworkspace found in ios/"
            ls -la ios/ || true
            exit 1
          fi
          echo "Found workspace: $WORKSPACE"

          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null | awk '/Schemes:/,0' | grep -v 'Schemes:' | grep -v 'Pods' | sed 's/^[[:space:]]*//' | grep -v '^$' | head -1)
          if [ -z "$SCHEME" ]; then
            SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          fi
          echo "Using scheme: $SCHEME"

          ARCHIVE_PATH="/tmp/SayUpAI.xcarchive"
          IPA_DIR="build/ios/ipa"
          mkdir -p "$IPA_DIR"

          # Show Xcode version
          echo "=== Xcode version ==="
          xcodebuild -version

          # Get Xcode major version
          XCODE_MAJOR=$(xcodebuild -version 2>/dev/null | head -1 | sed 's/Xcode //' | cut -d. -f1)
          echo "Xcode major version: $XCODE_MAJOR"

          # Create exportOptions plist - Xcode 26+ does NOT support 'method' key
          EXPORT_OPTIONS="$HOME/export_options.plist"
          echo "=== Creating exportOptions plist at $EXPORT_OPTIONS ==="

          if [ "$XCODE_MAJOR" -ge 26 ] 2>/dev/null; then
            echo "Xcode 26+: Creating exportOptions WITHOUT method key"
            cat > "$EXPORT_OPTIONS" << 'PLIST_EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>destination</key>
  <string>export</string>
  <key>teamID</key>
  <string>6Q7S9N7MQ7</string>
  <key>signingStyle</key>
  <string>manual</string>
  <key>signingCertificate</key>
  <string>Apple Distribution</string>
  <key>provisioningProfiles</key>
  <dict>
    <key>com.speakfitai.app</key>
    <string>SpeakFit AI ios_app_store 1783551989</string>
  </dict>
  <key>uploadBitcode</key>
  <false/>
  <key>uploadSymbols</key>
  <true/>
</dict>
</plist>
PLIST_EOF
          else
            echo "Xcode $XCODE_MAJOR: Creating exportOptions WITH method=app-store"
            cat > "$EXPORT_OPTIONS" << 'PLIST_EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>method</key>
  <string>app-store</string>
  <key>destination</key>
  <string>export</string>
  <key>teamID</key>
  <string>6Q7S9N7MQ7</string>
  <key>signingStyle</key>
  <string>manual</string>
  <key>signingCertificate</key>
  <string>Apple Distribution</string>
  <key>provisioningProfiles</key>
  <dict>
    <key>com.speakfitai.app</key>
    <string>SpeakFit AI ios_app_store 1783551989</string>
  </dict>
  <key>uploadBitcode</key>
  <false/>
  <key>uploadSymbols</key>
  <true/>
</dict>
</plist>
PLIST_EOF
          fi

          echo "=== Final exportOptions ==="
          cat "$EXPORT_OPTIONS"

          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            PROVISIONING_PROFILE_SPECIFIER="SpeakFit AI ios_app_store 1783551989" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE="Manual" \
            DEVELOPMENT_TEAM="6Q7S9N7MQ7" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcpretty --color

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$IPA_DIR" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            COMPILER_INDEX_STORE_ENABLE=NO

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/*.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-workflow:
    name: Android Release Build (Expo)
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      vars:
        PACKAGE_NAME: "com.speakfitai.app"
        NODE_VERSION: "22"
      node: "22"
    scripts:
      - name: Install pnpm
        script: |
          if ! command -v pnpm &> /dev/null; then
            npm install -g pnpm@9.12.0
          else
            echo "pnpm already installed: $(pnpm --version)"
          fi

      - name: Install dependencies
        script: |
          pnpm install

      - name: Expo Prebuild (generate native Android project)
        script: |
          npx expo prebuild --platform android --clean --no-install

      - name: Build Android APK/AAB
        script: |
          cd android && ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
